name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.2.0)"
        required: false
        default: "v0.0.0-dev"

# Release runs after CI completes successfully for a tagged commit, or manually
# for an explicit tag via workflow_dispatch.
permissions:
  contents: write
  actions: read

env:
  PDFIUM_VERSION: "6611"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve which tag, if any, should be released for this workflow run.
  # ─────────────────────────────────────────────────────────────────────────
  release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.resolve.outputs.should_release }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_ref: ${{ steps.resolve.outputs.target_ref }}
    steps:
      - name: Resolve tag for this run
        id: resolve
        uses: actions/github-script@v7
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              const manualTag = process.env.MANUAL_TAG;
              if (!manualTag) {
                core.setFailed('workflow_dispatch requires an explicit tag input.');
                return;
              }

              core.setOutput('should_release', 'true');
              core.setOutput('release_tag', manualTag);
              core.setOutput('target_ref', manualTag);
              console.log(`Manual release requested for tag ${manualTag}`);
              return;
            }

            const workflowRun = context.payload.workflow_run;

            if (!workflowRun || workflowRun.conclusion !== 'success') {
              core.setOutput('should_release', 'false');
              console.log('Skipping release: CI workflow did not complete successfully.');
              return;
            }

            if (workflowRun.event !== 'push') {
              core.setOutput('should_release', 'false');
              console.log(`Skipping release: CI completed for unsupported event ${workflowRun.event}.`);
              return;
            }

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const matchingTag = tags.find(tag =>
              tag.name.startsWith('v') && tag.commit && tag.commit.sha === workflowRun.head_sha
            );

            if (!matchingTag) {
              core.setOutput('should_release', 'false');
              console.log(`Skipping release: no v* tag points at ${workflowRun.head_sha}.`);
              return;
            }

            core.setOutput('should_release', 'true');
            core.setOutput('release_tag', matchingTag.name);
            core.setOutput('target_ref', matchingTag.name);
            console.log(`Release enabled for tag ${matchingTag.name} from CI run ${workflowRun.html_url}`);

  # ─────────────────────────────────────────────────────────────────────────
  # Generate Tauri icons once on Linux and reuse across bundle jobs
  # ─────────────────────────────────────────────────────────────────────────
  prepare-icons:
    needs: release-context
    name: Prepare icons
    runs-on: ubuntu-22.04
    if: needs.release-context.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.target_ref }}

      - name: Install icon toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            inkscape \
            imagemagick \
            icoutils \
            icnsutils \
            librsvg2-bin

      - name: Generate icons from brand logo
        run: |
          ls -lh assets/aegispdf_logo.svg
          chmod +x scripts/gen-icons.sh && ./scripts/gen-icons.sh

      - name: Upload generated icons
        uses: actions/upload-artifact@v4
        with:
          name: tauri-icons
          path: src-tauri/icons/
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Linux (.deb, .rpm, .AppImage)
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    needs: [release-context, prepare-icons]
    name: Linux bundles
    runs-on: ubuntu-22.04
    if: needs.release-context.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.target_ref }}

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            wget \
            file \
            inkscape \
            imagemagick \
            icoutils \
            icnsutils \
            librsvg2-bin \
            rpm \
            squashfs-tools \
            fakeroot \
            tesseract-ocr \
            libxcb1-dev \
            libxcb-render0-dev

      - name: Install PDFium
        run: |
          wget -q "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${PDFIUM_VERSION}/pdfium-linux-x64.tgz" \
               -O /tmp/pdfium.tgz
          tar -xzf /tmp/pdfium.tgz -C /tmp
          sudo cp /tmp/lib/libpdfium.so /usr/local/lib/
          sudo ldconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Download generated icons
        uses: actions/download-artifact@v4
        with:
          name: tauri-icons
          path: src-tauri/icons/

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri bundles (deb + rpm + appimage)
        run: npm run tauri build -- --bundles deb,rpm,appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find src-tauri/target/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec cp {} artifacts/ \;

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Windows (.msi, -setup.exe via NSIS)
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows bundles
    needs: [release-context, prepare-icons]
    runs-on: windows-latest
    if: needs.release-context.outputs.should_release == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.target_ref }}

      - name: Install PDFium
        shell: pwsh
        run: |
          $url = "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${env:PDFIUM_VERSION}/pdfium-win-x64.tgz"
          Invoke-WebRequest $url -OutFile "$env:TEMP\pdfium.tgz"
          tar -xzf "$env:TEMP\pdfium.tgz" -C "$env:TEMP"
          Copy-Item "$env:TEMP\bin\pdfium.dll" "$env:SystemRoot\System32\pdfium.dll" -Force

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Download generated icons
        uses: actions/download-artifact@v4
        with:
          name: tauri-icons
          path: src-tauri/icons/

      - name: Build Tauri bundles (msi + nsis)
        run: npm run tauri build -- --bundles msi,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse `
            -Include "*.msi","*-setup.exe" | Copy-Item -Destination artifacts\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release — create the release record once, then upload platform
  # artifacts independently so one platform does not block the other.
  # ─────────────────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [release-context]
    runs-on: ubuntu-latest
    if: needs.release-context.outputs.should_release == 'true'

    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-context.outputs.release_tag }}
          name: "AegisPDF ${{ needs.release-context.outputs.release_tag }}"
          draft: false
          prerelease: ${{ contains(needs.release-context.outputs.release_tag, '-') }}
          generate_release_notes: true

  upload-linux-release-assets:
    name: Upload Linux release assets
    needs: [release-context, create-release, build-linux]
    runs-on: ubuntu-latest
    if: needs.release-context.outputs.should_release == 'true'

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: release-artifacts/linux/

      - name: Generate Linux checksums
        run: |
          cd release-artifacts
          find linux -type f | sort | xargs sha256sum > SHA256SUMS-linux.txt
          cat SHA256SUMS-linux.txt

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-context.outputs.release_tag }}
          append_body: true
          files: |
            release-artifacts/linux/**/*
            release-artifacts/SHA256SUMS-linux.txt

  upload-windows-release-assets:
    name: Upload Windows release assets
    needs: [release-context, create-release, build-windows]
    runs-on: ubuntu-latest
    if: needs.release-context.outputs.should_release == 'true'

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: release-artifacts/windows/

      - name: Generate Windows checksums
        run: |
          cd release-artifacts
          find windows -type f | sort | xargs sha256sum > SHA256SUMS-windows.txt
          cat SHA256SUMS-windows.txt

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-context.outputs.release_tag }}
          append_body: true
          files: |
            release-artifacts/windows/**/*
            release-artifacts/SHA256SUMS-windows.txt

  # ─────────────────────────────────────────────────────────────────────────
  # APT Repository — publish a signed Debian repo to GitHub Pages
  #
  # One-time setup required by the repository maintainer:
  #   1. Generate a dedicated GPG signing key (no passphrase):
  #        gpg --batch --gen-key <<EOF
  #        Key-Type: EdDSA
  #        Key-Curve: ed25519
  #        Name-Real: AegisPDF Releases
  #        Name-Email: releases@aegispdf.dev
  #        Expire-Date: 0
  #        %no-protection
  #        EOF
  #   2. Export the private key base64-encoded and store as a repository secret:
  #        gpg --export-secret-keys --armor <KEY_ID> | base64 -w0 | \
  #          gh secret set APT_SIGNING_KEY --repo aegispdf/aegispdf
  #   3. Enable GitHub Pages: Settings → Pages → Branch: gh-pages / root
  # ─────────────────────────────────────────────────────────────────────────
  publish-apt-repo:
    name: Publish APT repository (GitHub Pages)
    needs: [release-context, build-linux]
    runs-on: ubuntu-latest
    if: needs.release-context.outputs.should_release == 'true'
    permissions:
      contents: write

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: linux-artifacts/

      - name: Clone or initialise gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --heads "$REMOTE" gh-pages | grep -q gh-pages; then
            git clone --depth=1 --branch=gh-pages --single-branch "$REMOTE" gh-pages-dir
          else
            mkdir gh-pages-dir
            cd gh-pages-dir
            git init
            git remote add origin "$REMOTE"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            printf '<!doctype html><html><head><meta charset="utf-8"><title>AegisPDF</title></head>\n<body><h1>AegisPDF</h1><p>See <a href="https://github.com/${{ github.repository }}">GitHub</a> for installation instructions.</p></body></html>\n' > index.html
          fi

      - name: Set up APT pool and copy new .deb
        run: |
          mkdir -p gh-pages-dir/apt/pool/main
          mkdir -p gh-pages-dir/apt/dists/stable/main/binary-amd64
          find linux-artifacts/ -name "*.deb" -exec cp -v {} gh-pages-dir/apt/pool/main/ \;

      - name: Install apt-utils
        run: sudo apt-get install -y apt-utils

      - name: Generate Packages index
        run: |
          cd gh-pages-dir/apt
          dpkg-scanpackages --multiversion pool/ \
            > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages

      - name: Generate Release file
        run: |
          cat > /tmp/apt-release.conf << 'EOF'
          APT::FTPArchive::Release {
            Origin "AegisPDF";
            Label "AegisPDF";
            Suite "stable";
            Codename "stable";
            Architectures "amd64";
            Components "main";
            Description "AegisPDF — Privacy-focused offline PDF workspace";
          };
          EOF
          cd gh-pages-dir/apt/dists/stable
          apt-ftparchive -c /tmp/apt-release.conf release . > Release

      - name: Import GPG key, sign Release, export public key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          echo "$APT_SIGNING_KEY" | base64 -d | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --with-colons \
                   | awk -F: '/^sec/{print $5; exit}')
          # Detached ASCII-armoured signature (legacy apt clients)
          gpg --batch --yes --default-key "$KEY_ID" \
              --armor --detach-sign \
              -o gh-pages-dir/apt/dists/stable/Release.gpg \
                 gh-pages-dir/apt/dists/stable/Release
          # Inline clearsigned (modern apt)
          gpg --batch --yes --default-key "$KEY_ID" \
              --clearsign \
              -o gh-pages-dir/apt/dists/stable/InRelease \
                 gh-pages-dir/apt/dists/stable/Release
          # Public key at the Pages root for the install script
          gpg --export --armor "$KEY_ID" > gh-pages-dir/aegispdf.gpg

      - name: Commit and push gh-pages
        run: |
          cd gh-pages-dir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet \
            || git commit -m "apt: publish ${{ needs.release-context.outputs.release_tag }}"
          git push origin gh-pages

  # ─────────────────────────────────────────────────────────────────────────
  # WinGet — create a manifest PR against microsoft/winget-pkgs
  #
  # One-time setup required by the repository maintainer:
  #   1. Fork microsoft/winget-pkgs into your GitHub account (or the org).
  #   2. Create a fine-grained PAT with "Contents: Read and Write" on that fork.
  #   3. Store as repository secret:
  #        gh secret set WINGET_TOKEN --repo aegispdf/aegispdf
  #   4. After the first PR is merged, winget-pkgs bots take over for updates.
  # ─────────────────────────────────────────────────────────────────────────
  publish-winget:
    name: Submit to WinGet
    needs: [release-context, build-windows]
    runs-on: windows-latest
    # Skip pre-releases (tags containing a hyphen, e.g. v1.0.0-beta.1)
    if: needs.release-context.outputs.should_release == 'true' && !contains(needs.release-context.outputs.release_tag, '-')

    steps:
      - name: Check WinGet package registration
        id: winget-package
        shell: pwsh
        run: |
          $pkgId = 'AegisPDF.AegisPDF'
          $manifestUrl = "https://github.com/microsoft/winget-pkgs/tree/master/manifests/$($pkgId.ToLower()[0])/$($pkgId.Replace('.', '/'))"

          try {
            Invoke-WebRequest -Uri $manifestUrl -Method Head -ErrorAction Stop | Out-Null
            "exists=true" >> $env:GITHUB_OUTPUT
            Write-Host "WinGet package exists: $pkgId"
          } catch {
            "exists=false" >> $env:GITHUB_OUTPUT
            Write-Warning "WinGet package $pkgId is not yet present in microsoft/winget-pkgs. Skipping automated submission for this release."
          }

      - name: Note WinGet bootstrap requirement
        if: steps.winget-package.outputs.exists != 'true'
        shell: pwsh
        run: |
          Write-Host "Skipping WinGet release automation."
          Write-Host "Bootstrap required: submit the first manifest for AegisPDF.AegisPDF to microsoft/winget-pkgs manually, then later releases can use winget-releaser."

      - name: Submit WinGet manifest
        if: steps.winget-package.outputs.exists == 'true'
        uses: vedantmgoyal9/winget-releaser@main
        with:
          # Package identifier — must match what you register in winget-pkgs.
          # Before the first release: submit
          #   manifests/a/AegisPDF/AegisPDF/<version>/ manually once, then this
          #   action will handle all future updates automatically.
          identifier: AegisPDF.AegisPDF
          release-tag: ${{ needs.release-context.outputs.release_tag }}
          # Only include the NSIS setup installer, not the MSI
          installers-regex: '.*-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
