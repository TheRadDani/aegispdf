name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.2.0)"
        required: false
        default: "v0.0.0-dev"

# Release workflow requires the full CI pipeline to have passed first.
# The 'ci-passed' job enforces this via workflow_run dependency.
permissions:
  contents: write
  actions: read

env:
  PDFIUM_VERSION: "6611"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Gate: verify the most recent CI run on this ref passed all security checks
  # ─────────────────────────────────────────────────────────────────────────
  ci-passed:
    name: "🔒 Verify CI security + quality gate"
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status for this ref
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              event: "push",
              head_sha: context.sha,
            });

            const ciRun = runs.workflow_runs.find(r =>
              r.name === "CI" && r.conclusion === "success"
            );

            if (!ciRun) {
              core.setFailed(
                "No successful CI run found for this commit SHA. " +
                "Ensure the full CI pipeline (security + quality gates) passes before releasing."
              );
            } else {
              console.log(`CI passed: ${ciRun.html_url}`);
            }

  # ─────────────────────────────────────────────────────────────────────────
  # Linux (.deb, .rpm, .AppImage)
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    needs: ci-passed
    name: Linux bundles
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential \
            wget \
            file \
            inkscape \
            imagemagick \
            icoutils \
            icnsutils \
            librsvg2-bin \
            rpm \
            squashfs-tools \
            fakeroot \
            tesseract-ocr \
            libxcb1-dev \
            libxcb-render0-dev

      - name: Install PDFium
        run: |
          wget -q "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${PDFIUM_VERSION}/pdfium-linux-x64.tgz" \
               -O /tmp/pdfium.tgz
          tar -xzf /tmp/pdfium.tgz -C /tmp
          sudo cp /tmp/lib/libpdfium.so /usr/local/lib/
          sudo ldconfig

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Generate icons from brand logo
        run: |
          ls -lh assets/aegispdf_logo.svg
          chmod +x scripts/gen-icons.sh && ./scripts/gen-icons.sh

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Build Tauri bundles (deb + rpm + appimage)
        run: npm run tauri build -- --bundles deb,rpm,appimage
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find src-tauri/target/release/bundle -type f \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) \
            -exec cp {} artifacts/ \;

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Windows (.msi, -setup.exe via NSIS)
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows bundles
    needs: ci-passed
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PDFium
        shell: pwsh
        run: |
          $url = "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F${env:PDFIUM_VERSION}/pdfium-win-x64.tgz"
          Invoke-WebRequest $url -OutFile "$env:TEMP\pdfium.tgz"
          tar -xzf "$env:TEMP\pdfium.tgz" -C "$env:TEMP"
          Copy-Item "$env:TEMP\bin\pdfium.dll" "$env:SystemRoot\System32\pdfium.dll" -Force

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install ImageMagick (icon generation)
        shell: pwsh
        run: |
          winget install --id ImageMagick.ImageMagick --exact `
            --accept-source-agreements --accept-package-agreements -h || true

      - name: Generate icons from brand logo
        shell: pwsh
        run: |
          $inkscape = "C:\Program Files\Inkscape\bin\inkscape.exe"
          $magick   = "magick"
          $svg = "assets\aegispdf_logo.svg"   # canonical brand logo
          $out = "src-tauri\icons"
          if (-not (Test-Path $svg)) { throw "Brand SVG not found: $svg" }

          function Render($size, $dest) {
              if (Test-Path $inkscape) {
                  & $inkscape --export-type=png --export-width=$size --export-height=$size `
                               --export-filename=$dest $svg 2>$null
              } else {
                  & $magick convert -background none -resize "${size}x${size}" $svg $dest
              }
          }

          Render 32  "$out\32x32.png"
          Render 128 "$out\128x128.png"
          Render 256 "$out\256x256.png"
          Copy-Item "$out\256x256.png" "$out\128x128@2x.png"

          # ICO
          & $magick convert "$out\32x32.png" "$out\128x128.png" "$out\256x256.png" "$out\icon.ico"

          # ICNS placeholder (not needed on Windows builds)
          Copy-Item "$out\256x256.png" "$out\icon.icns" -ErrorAction SilentlyContinue

      - name: Build Tauri bundles (msi + nsis)
        run: npm run tauri build -- --bundles msi,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          Get-ChildItem -Path src-tauri\target\release\bundle -Recurse `
            -Include "*.msi","*-setup.exe" | Copy-Item -Destination artifacts\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: artifacts/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # GitHub Release — attach all artifacts when triggered by a tag
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bundles
          path: release-artifacts/linux/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-bundles
          path: release-artifacts/windows/

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f | sort | xargs sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AegisPDF ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*
