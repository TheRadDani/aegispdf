name: Dependency Review

# Runs only on PRs — compares dependency changes between base and head.
# Blocks merging if any newly added package has a known CVE or disallowed license.
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: "🔎 Dependency review"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block any severity equal to or above this level
          fail-on-severity: high

          # Block packages with these licenses (copyleft)
          deny-licenses: >
            GPL-1.0, GPL-2.0, GPL-3.0,
            LGPL-2.0, LGPL-2.1, LGPL-3.0,
            AGPL-1.0, AGPL-3.0,
            EUPL-1.0, EUPL-1.1, EUPL-1.2,
            MPL-2.0,
            CDDL-1.0,
            SSPL-1.0,
            BUSL-1.1

          # Post comment summarising changes
          comment-summary-in-pr: always

          # Warn (but don't block) on packages that are deprecated
          warn-on-openssf-scorecard-level: 3
