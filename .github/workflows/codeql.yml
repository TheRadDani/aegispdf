name: CodeQL SAST

# Runs CodeQL static analysis on every PR targeting main/dev,
# every push to main/dev, and on a weekly schedule.
# Results appear in GitHub → Security → Code scanning alerts.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Every Monday at 03:00 UTC — catches new CVEs against unchanged code
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze-javascript:
    name: "🔍 CodeQL — JavaScript/TypeScript"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: |
            security-extended
            security-and-quality
          config: |
            paths:
              - src
            paths-ignore:
              - node_modules
              - dist

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build (for better autobuilder coverage)
        run: npm ci && npm run build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
          upload: true

  analyze-rust:
    name: "🔍 CodeQL — Rust (experimental)"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install minimal system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config

      - name: Initialize CodeQL (Rust)
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          queries: security-extended

      - name: Build Rust crate for CodeQL
        working-directory: src-tauri
        run: cargo build 2>&1

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
          upload: true
