# cargo-deny configuration for AegisPDF
# Run locally: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/
# Format: cargo-deny v0.16+ (version = 2 schemas)

[graph]
all-features = false
no-default-features = false

# ─────────────────────────────────────────────────────────────────────────────
# ADVISORIES
# v2 field reference:
#   yanked        → "deny" | "warn" | "allow"
#   unmaintained  → "all" | "workspace" | "transitive" | "none"
#   unsound       → "all" | "workspace" | "transitive" | "none"
# Removed in v0.16: vulnerability (always hard-error), notice (always warn)
# ─────────────────────────────────────────────────────────────────────────────
[advisories]
version = 2
unmaintained  = "all"    # warns; specific transitive-dep entries are suppressed below
unsound       = "all"    # hard error; Tauri transitive exceptions suppressed below
yanked        = "deny"   # hard error
db-urls       = ["https://github.com/rustsec/advisory-db"]
db-path       = "~/.cargo/advisory-db"

# Ignored advisories — only when NO upstream fix exists AND risk is documented.
#
# ── gtk-rs GTK3 "unmaintained" batch (RUSTSEC-2024-040x) ─────────────────────
# gtk-rs moved to GTK4; Tauri v2 still requires GTK3 via WebKitGTK on Linux.
# These are transitive deps we cannot replace until Tauri migrates to GTK4.
# None carry a CVE. Review when Tauri drops its GTK3 dependency.
#
# ── fxhash (RUSTSEC-2025-0057) ────────────────────────────────────────────────
# Non-cryptographic hash used by transitive deps. No CVE; no security impact.
#
# ── glib unsound VariantStrIter (RUSTSEC-2024-0429) ──────────────────────────
# Via tauri→webkit2gtk→glib 0.18.5. No patched glib 0.18.x in the Tauri 2.x
# ecosystem. Not reachable via AegisPDF's attack surface (offline PDF tool).
ignore = [
  { id = "RUSTSEC-2024-0408", reason = "glib: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0409", reason = "glib-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0410", reason = "gio: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0411", reason = "gio-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0412", reason = "gdk: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0413", reason = "atk: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0414", reason = "gtk: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0415", reason = "cairo: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0416", reason = "pango: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0417", reason = "gdk-pixbuf: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0418", reason = "gdk-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0419", reason = "cairo-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0420", reason = "gtk-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0421", reason = "pango-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2024-0422", reason = "atk-sys: GTK3 binding required by Tauri/WebKitGTK; no upstream fix" },
  { id = "RUSTSEC-2025-0057", reason = "fxhash: non-security hash; no CVE; replacement is upstream's responsibility" },
  { id = "RUSTSEC-2024-0429", reason = "glib unsound VariantStrIter: transitive via Tauri/webkit2gtk; no fix in Tauri 2.x ecosystem" },
  # ── Unmaintained proc-macro-error (RUSTSEC-2024-0370) ─────────────────────────
  # Transitive dep via tauri macros. No security impact; replacement is upstream's
  # responsibility.
  { id = "RUSTSEC-2024-0370", reason = "proc-macro-error: unmaintained transitive dep via tauri; no security impact" },
  # ── Unmaintained unic-* crates (RUSTSEC-2025-007x / RUSTSEC-2025-009x) ───────
  # Transitive deps pulled via tauri/servo/webview. No CVE; no upstream fix in
  # the Tauri 2.x ecosystem.
  { id = "RUSTSEC-2025-0075", reason = "unic-char-range: unmaintained transitive dep; no upstream fix" },
  { id = "RUSTSEC-2025-0080", reason = "unic-common: unmaintained transitive dep; no upstream fix" },
  { id = "RUSTSEC-2025-0081", reason = "unic-char-property: unmaintained transitive dep; no upstream fix" },
  { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version: unmaintained transitive dep; no upstream fix" },
  { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident: unmaintained transitive dep; no upstream fix" },
]

# ─────────────────────────────────────────────────────────────────────────────
# LICENSES
# v2: only the `allow` list is needed. Anything NOT in this list is rejected
# automatically — no separate `deny`, `unlicensed`, `copyleft`, or `default`
# fields are required (all removed in cargo-deny v0.16).
# ─────────────────────────────────────────────────────────────────────────────
[licenses]
version = 2

allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "0BSD",
  "CC0-1.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "OpenSSL",
  "MPL-2.0",
]

# Per-crate exceptions — only when the license is effectively permissive but
# uses a non-SPDX identifier that does not appear in the allow list above.
exceptions = [
  # Uncomment if ring is added: its BoringSSL-derived license is permissive.
  # { allow = ["ISC", "MIT", "OpenSSL"], name = "ring" },
]

# ─────────────────────────────────────────────────────────────────────────────
# BANS — duplicate version policy and forbidden crates
# Entry format uses `name` (not the old `crate`) in cargo-deny v0.16+.
# ─────────────────────────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

deny = [
  # Unmaintained TLS — use rustls or Tauri's built-in TLS instead
  { name = "openssl", reason = "use rustls or tauri's built-in TLS" },
  # Insecure PRNG — rand_core <0.6 has known weaknesses.
  # rand v0.7.3 (via phf_generator) pulls in rand_core 0.5.x along with its
  # sub-crates (rand_chacha, rand_hc, rand_pcg). All direct parents are listed
  # as wrappers so the ban fires only if a non-rand crate introduces it.
  { name = "rand_core", version = "<0.6", reason = "use rand_core >=0.6 for security", wrappers = ["rand", "rand_chacha", "rand_hc", "rand_pcg"] },
  # Unmaintained serialisation — serde is the maintained replacement
  { name = "rustc-serialize", reason = "unmaintained; use serde" },
  # time <0.3 — RUSTSEC-2020-0071 (local time side channel)
  { name = "time", version = "<0.3", reason = "time <0.3 has RUSTSEC-2020-0071" },
]

# Accepted duplicate versions brought in by the Tauri/webview2 ecosystem.
skip = [
  { name = "windows-sys" },
  { name = "windows-targets" },
  { name = "windows_x86_64_msvc" },
]

# ─────────────────────────────────────────────────────────────────────────────
# SOURCES — only allow crates.io; no unknown registries or raw git URLs
# ─────────────────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
